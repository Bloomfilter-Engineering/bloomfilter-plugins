name: Lint (ruff)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install ruff
        run: pipx install ruff

      - name: Lint
        run: ruff check --output-format=github .

      - name: Format check
        run: ruff format --check .
