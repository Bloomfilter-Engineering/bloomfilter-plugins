name: Validate Claude Code Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace
        run: claude plugin validate .

      - name: Validate individual plugins
        run: |
          shopt -s nullglob
          for plugin_dir in plugins/*/; do
            # Only validate Claude Code plugins. Other plugins in this
            # monorepo (e.g. agent-miner-cursor) have their own manifest
            # format (.cursor-plugin/plugin.json) and would fail here.
            if [ ! -f "${plugin_dir}.claude-plugin/plugin.json" ]; then
              echo "Skipping $plugin_dir (no .claude-plugin/plugin.json)"
              continue
            fi
            echo "Validating $plugin_dir"
            claude plugin validate "$plugin_dir"
          done
